<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark Morning Edition — Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0a0a0a; color: #fafafa;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 4rem 2rem;
  }
  .logo {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 3.5rem; font-weight: 900; letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
  }
  .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 3rem; }
  .editions { list-style: none; width: 100%; max-width: 500px; }
  .editions li { margin-bottom: 1rem; }
  .editions a {
    display: block; padding: 1.2rem 1.5rem;
    background: #18181b; border-radius: 12px;
    color: #fafafa; text-decoration: none;
    font-size: 1.15rem; font-weight: 500;
    border-left: 4px solid #a855f7;
    transition: background 0.2s, transform 0.2s;
  }
  .editions a:hover { background: #27272a; transform: translateX(4px); }
  .editions .date { color: #a78bfa; font-weight: 600; }
  .footer { margin-top: 3rem; color: #555; font-size: 0.85rem; }
</style>
</head>
<body>
  <h1 class="logo">Morning Edition</h1>
  <p class="subtitle">Spark Competitor Intelligence Archive</p>
  <ul class="editions" id="editions"></ul>
  <p class="footer">Auto-updated daily · Powered by Claude</p>
  <script>
    // Auto-populate from known editions - this gets updated by the publishing script
    const editions = [
      { date: "2026-04-27", label: "Sunday, April 27, 2026" },
      { date: "2026-04-24", label: "Thursday, April 24, 2026" }
    ];
    const list = document.getElementById('editions');
    editions.sort((a, b) => b.date.localeCompare(a.date));
    editions.forEach(e => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${e.date}.html"><span class="date">${e.date}</span> — ${e.label}</a>`;
      list.appendChild(li);
    });
  </script>
</body>
</html>
